<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Mini Cookie Clicker</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #fcf3cf; }
        #cookie-btn { font-size: 50px; cursor: pointer; border: none; background: none; }
        .stats { font-size: 24px; margin: 20px; }
        .upgrade-section { border: 2px solid #b3b3b3; padding: 20px; display: inline-block; border-radius: 10px; background: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #upgrade-btn { padding: 10px; background: #008d3b; color: white; border: none; border-radius: 5px; cursor: pointer; }
    
        
@keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  10% { transform: translate(-1px, -2px) rotate(-1deg); }
  20% { transform: translate(-3px, 0px) rotate(1deg); }
  30% { transform: translate(3px, 2px) rotate(0deg); }
  40% { transform: translate(1px, -1px) rotate(1deg); }
  50% { transform: translate(-1px, 2px) rotate(-1deg); }
  60% { transform: translate(-3px, 1px) rotate(0deg); }
  70% { transform: translate(3px, 1px) rotate(-1deg); }
  80% { transform: translate(-1px, -1px) rotate(1deg); }
  90% { transform: translate(1px, 2px) rotate(0deg); }
  100% { transform: translate(1px, -2px) rotate(-1deg); }
}


.cookie-shake {
  
  animation: shake 0.5s; 
  
  animation-iteration-count: 1; 
}
    </style>
</head>
<body>

    <div class="stats">
        คุกกี้: <span id="cookie-count">0</span> ชิ้น<br>
        พลังการคลิก: <span id="click-power">1</span> (ต่อคลิก)
    </div>

    <button id="cookie-btn">🍪</button>

    <div class="upgrade-section">
        <h3>อัปเกรดเม้าส์</h3>
        <p>ราคา: <span id="upgrade-cost">10</span> คุกกี้</p>
        <button id="upgrade-btn">อัปเกรดพลังคลิก (+1)</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
